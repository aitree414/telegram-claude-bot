<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會計系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark mb-4" id="mainNav">
        <div class="container">
            <a class="navbar-brand" href="#/">
                <i class="bi bi-calculator-fill me-2"></i>會計系統
            </a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="#/"><i class="bi bi-grid-fill me-1"></i>儀表板</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#/suppliers"><i class="bi bi-building me-1"></i>供應商</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#/backups"><i class="bi bi-cloud-arrow-down me-1"></i>備份</a>
                    </li>
                </ul>
            </div>
            <div class="d-flex align-items-center" id="navRight">
                <span class="text-white-50 me-2 d-none d-md-inline" id="navUsername"></span>
                <button class="btn btn-outline-light btn-sm d-none" id="logoutBtn" onclick="doLogout()">
                    <i class="bi bi-box-arrow-right me-1"></i>登出
                </button>
                <button class="navbar-toggler ms-2" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Login Page -->
    <div class="container" id="loginPage" style="display:none;">
        <div class="row justify-content-center mt-5">
            <div class="col-11 col-sm-8 col-md-6 col-lg-4">
                <div class="card shadow">
                    <div class="card-body p-4">
                        <div class="text-center mb-4">
                            <i class="bi bi-calculator-fill text-primary" style="font-size:3rem;"></i>
                            <h4 class="mt-2">會計系統</h4>
                            <p class="text-muted">請登入你的帳號</p>
                        </div>
                        <form id="loginForm" onsubmit="doLogin(event)">
                            <div class="mb-3">
                                <label class="form-label">帳號</label>
                                <input type="text" class="form-control" id="loginUsername" required autofocus>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">密碼</label>
                                <input type="password" class="form-control" id="loginPassword" required>
                            </div>
                            <div class="alert alert-danger d-none" id="loginError"></div>
                            <button type="submit" class="btn btn-primary w-100 btn-lg">
                                <i class="bi bi-box-arrow-in-right me-2"></i>登入
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container" id="app">
        <div class="loading-spinner">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">載入中...</span>
            </div>
        </div>
    </div>

    <!-- Transaction Modal -->
    <div class="modal fade" id="txModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="txModalTitle">新增交易</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="txForm">
                        <input type="hidden" id="editIndex" value="">
                        <input type="hidden" id="projectCode" value="">
                        <div class="row g-3">
                            <div class="col-md-4">
                                <label class="form-label">日期</label>
                                <input type="date" class="form-control" id="txDate" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">類型</label>
                                <select class="form-select" id="txType" required>
                                    <option value="income">收入</option>
                                    <option value="expense">支出</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">分類</label>
                                <select class="form-select" id="txCategory">
                                    <option value="invoice">Invoice</option>
                                    <option value="po">PO</option>
                                    <option value="claim">Claim</option>
                                    <option value="quotation">Quotation</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">供應商/客戶</label>
                                <input type="text" class="form-control" id="txVendor">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">項目描述</label>
                                <input type="text" class="form-control" id="txDescription">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">金額</label>
                                <input type="number" step="0.01" class="form-control" id="txAmount" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">貨幣</label>
                                <select class="form-select" id="txCurrency">
                                    <option value="HKD">HKD</option>
                                    <option value="TWD">TWD</option>
                                    <option value="USD">USD</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">付款狀態</label>
                                <select class="form-select" id="txStatus">
                                    <option value="paid">Paid</option>
                                    <option value="pending">Pending</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">備註</label>
                                <textarea class="form-control" id="txNotes" rows="2"></textarea>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">檔案</label>
                                <div class="input-group">
                                    <input type="file" class="form-control" id="txFile" accept=".pdf,.doc,.docx,.xlsx,.jpg,.jpeg,.png,.csv">
                                    <button class="btn btn-outline-info" type="button" onclick="ocrInvoice()" title="OCR 辨識發票">
                                        <i class="bi bi-camera"></i> OCR
                                    </button>
                                </div>
                                <input type="hidden" id="txFileName" value="">
                                <div id="fileInfo" class="form-text mt-1"></div>
                                <div id="ocrStatus" class="form-text mt-1"></div>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" id="txSaveBtn">
                        <i class="bi bi-check-lg me-1"></i>儲存
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Delete Confirm Modal -->
    <div class="modal fade" id="deleteModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title">確認刪除</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p>確定要刪除這筆交易嗎？此操作無法復原。</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-danger" id="deleteConfirmBtn">
                        <i class="bi bi-trash me-1"></i>確認刪除
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Supplier Edit Modal -->
    <div class="modal fade" id="supplierModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">編輯供應商資訊</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form>
                        <input type="hidden" id="editSupplierName" value="">
                        <div class="mb-3">
                            <label class="form-label">聯絡人</label>
                            <input type="text" class="form-control" id="editSupplierContact">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">電話</label>
                            <input type="text" class="form-control" id="editSupplierPhone">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" id="editSupplierEmail">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">備註</label>
                            <textarea class="form-control" id="editSupplierNotes" rows="3"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" id="supplierSaveBtn">
                        <i class="bi bi-check-lg me-1"></i>儲存
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
